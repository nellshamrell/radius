api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--weatherdb
        value: Server=sqlserver,1433;User ID=sa;Password={{ securedParameter "sqlserver_password" }};TrustServerCertificate=true;Initial Catalog=weatherdb
      - name: weatherdb-password
        value: '{{ securedParameter "sqlserver_password" }}'
      - name: weatherdb-uri
        value: mssql://sa:{{ securedParameter "sqlserver_password" }}@sqlserver:1433/weatherdb
  template:
    containers:
      - image: {{ .Image }}
        name: apiservice
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: WEATHERDB_DATABASENAME
            value: weatherdb
          - name: WEATHERDB_HOST
            value: sqlserver
          - name: WEATHERDB_JDBCCONNECTIONSTRING
            value: jdbc:sqlserver://sqlserver:1433;trustServerCertificate=true;databaseName=weatherdb
          - name: WEATHERDB_PORT
            value: "1433"
          - name: WEATHERDB_USERNAME
            value: sa
          - name: ConnectionStrings__weatherdb
            secretRef: connectionstrings--weatherdb
          - name: WEATHERDB_PASSWORD
            secretRef: weatherdb-password
          - name: WEATHERDB_URI
            secretRef: weatherdb-uri
    scale:
      minReplicas: 1
tags:
  azd-service-name: apiservice
  aspire-resource-name: apiservice
